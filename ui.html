<!doctype html>
<meta charset="utf-8">
<style>
  :root{
    --bg:#0f172a;
    --panel:#0b1226;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --border:rgba(255,255,255,.12);
    --btn:#1f2937;
    --btn2:#111827;
    --accent:#22c55e;
    --tab-active:rgba(34,197,94,.18);
  }
  *{box-sizing:border-box}
  body{margin:12px;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
  .card{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));border:1px solid var(--border);border-radius:12px;padding:12px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  label{display:inline-flex;gap:6px;align-items:center;color:var(--muted);font-size:12px}
  input[type=radio],input[type=checkbox]{transform:translateY(0.5px)}
  select{background:var(--btn);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:12px}
  button{background:var(--btn);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:7px 10px;cursor:pointer}
  button:hover{background:var(--btn2)}
  button.primary{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.35)}
  button.primary:hover{background:rgba(34,197,94,.22)}
  textarea{width:100%;height:280px;margin-top:10px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.35}
  .status{margin-top:8px;color:var(--muted);font-size:12px;min-height:16px;display:flex;align-items:center;gap:8px}
  .hint{margin-top:6px;color:var(--muted);font-size:11px}
  .progress-bar{flex:1;height:4px;background:var(--btn);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .2s;width:0%}
  .sep{width:1px;height:16px;background:var(--border)}

  /* Tabs */
  .tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--border)}
  .tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--tab-active);border-radius:6px 6px 0 0}
  .opts-section{margin-top:8px}
  .hidden{display:none!important}
</style>

<div class="card">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="html">HTML</button>
    <button class="tab" data-tab="compose">Compose</button>
  </div>

  <div class="row">
    <label><input type="radio" name="scope" value="selection" checked> Selection</label>
    <label><input type="radio" name="scope" value="page"> Whole page</label>
    <span class="spacer"></span>
    <button id="export" class="primary">Export</button>
    <button id="copy">Copy</button>
    <button id="download">Download</button>
  </div>

  <!-- Common options -->
  <div class="row" style="margin-top:10px">
    <label><input id="optChildren" type="checkbox" checked> Children</label>
    <label><input id="optFills" type="checkbox" checked> Fills</label>
    <label><input id="optStrokes" type="checkbox" checked> Strokes</label>
    <label><input id="optRadius" type="checkbox" checked> Radius</label>
    <label><input id="optEffects" type="checkbox" checked> Shadows/Blur</label>
    <label><input id="optText" type="checkbox" checked> Text styles</label>
  </div>

  <!-- HTML-only options -->
  <div id="htmlOpts" class="row opts-section">
    <label title="Extract image fills as separate files."><input id="optEmbed" type="checkbox" checked> Extract images</label>
    <label title="Export vector nodes as inline SVG."><input id="optSvg" type="checkbox" checked> Vectors as SVG</label>
    <label title="Rasterize instances/components as PNG."><input id="optRasterIC" type="checkbox"> Rasterize instances</label>
    <label title="Rasterize containers with clip/mask."><input id="optRasterClip" type="checkbox" checked> Rasterize clipped</label>
    <label title="Extract repeated colors as CSS custom properties."><input id="optCssVars" type="checkbox"> CSS variables</label>
    <span class="sep"></span>
    <label>Format <select id="optImgFmt"><option value="PNG">PNG</option><option value="JPG">JPEG</option><option value="WEBP">WebP</option></select></label>
    <label>Scale <select id="optImgScale"><option value="1">1x</option><option value="2">2x</option><option value="3">3x</option></select></label>
  </div>

  <!-- Compose-only options -->
  <div id="composeOpts" class="row opts-section hidden">
    <label title="Single @Composable function output"><input type="radio" name="composeFormat" value="single" checked> Single function</label>
    <label title="File structure (Screen.kt + components/ + theme/)"><input type="radio" name="composeFormat" value="files"> File structure (ZIP)</label>
    <span class="sep"></span>
    <label title="Extract images as drawable resources."><input id="optComposeImg" type="checkbox" checked> Extract images</label>
    <label>Scale <select id="optComposeScale"><option value="1">1x</option><option value="2">2x</option><option value="3">3x</option></select></label>
  </div>

  <div id="hintHtml" class="hint">Tip: Auto Layout frames export as flexbox. Use data-figma-* attributes for Compose conversion.</div>
  <div id="hintCompose" class="hint hidden">Tip: Auto Layout frames map to Row/Column. Components are extracted as separate @Composable functions.</div>

  <textarea id="output" placeholder="Exported code will appear here"></textarea>
  <div class="status">
    <span id="statusText"></span>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  </div>
</div>

<script>
  // ── Mini ZIP builder (STORE method, no compression) ──
  function buildZip(files) {
    const encoder = new TextEncoder();
    const centralDir = [];
    const parts = [];
    let offset = 0;

    for (const file of files) {
      const nameBytes = encoder.encode(file.name);
      const crc = crc32(file.data);
      const size = file.data.length;

      const local = new Uint8Array(30 + nameBytes.length + size);
      const lv = new DataView(local.buffer);
      lv.setUint32(0, 0x04034b50, true);
      lv.setUint16(4, 20, true);
      lv.setUint16(6, 0, true);
      lv.setUint16(8, 0, true);
      lv.setUint16(10, 0, true);
      lv.setUint16(12, 0, true);
      lv.setUint32(14, crc, true);
      lv.setUint32(18, size, true);
      lv.setUint32(22, size, true);
      lv.setUint16(26, nameBytes.length, true);
      lv.setUint16(28, 0, true);
      local.set(nameBytes, 30);
      local.set(file.data, 30 + nameBytes.length);
      parts.push(local);

      const central = new Uint8Array(46 + nameBytes.length);
      const cv = new DataView(central.buffer);
      cv.setUint32(0, 0x02014b50, true);
      cv.setUint16(4, 20, true);
      cv.setUint16(6, 20, true);
      cv.setUint16(8, 0, true);
      cv.setUint16(10, 0, true);
      cv.setUint16(12, 0, true);
      cv.setUint16(14, 0, true);
      cv.setUint32(16, crc, true);
      cv.setUint32(20, size, true);
      cv.setUint32(24, size, true);
      cv.setUint16(28, nameBytes.length, true);
      cv.setUint16(30, 0, true);
      cv.setUint16(32, 0, true);
      cv.setUint16(34, 0, true);
      cv.setUint16(36, 0, true);
      cv.setUint32(38, 0, true);
      cv.setUint32(42, offset, true);
      central.set(nameBytes, 46);
      centralDir.push(central);

      offset += local.length;
    }

    let cdSize = 0;
    for (const c of centralDir) cdSize += c.length;
    const eocd = new Uint8Array(22);
    const ev = new DataView(eocd.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(4, 0, true);
    ev.setUint16(6, 0, true);
    ev.setUint16(8, files.length, true);
    ev.setUint16(10, files.length, true);
    ev.setUint32(12, cdSize, true);
    ev.setUint32(16, offset, true);
    ev.setUint16(20, 0, true);

    const totalSize = offset + cdSize + 22;
    const out = new Uint8Array(totalSize);
    let pos = 0;
    for (const p of parts) { out.set(p, pos); pos += p.length; }
    for (const c of centralDir) { out.set(c, pos); pos += c.length; }
    out.set(eocd, pos);
    return out;
  }

  const crc32Table = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[i] = c;
    }
    return t;
  })();

  function crc32(data) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < data.length; i++) crc = crc32Table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  function base64ToUint8Array(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  // ── Tab switching ──
  let currentTab = 'html';
  const tabs = document.querySelectorAll('.tab');
  const htmlOpts = document.getElementById('htmlOpts');
  const composeOpts = document.getElementById('composeOpts');
  const hintHtml = document.getElementById('hintHtml');
  const hintCompose = document.getElementById('hintCompose');

  tabs.forEach(tab => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;

      htmlOpts.classList.toggle('hidden', currentTab !== 'html');
      composeOpts.classList.toggle('hidden', currentTab !== 'compose');
      hintHtml.classList.toggle('hidden', currentTab !== 'html');
      hintCompose.classList.toggle('hidden', currentTab !== 'compose');

      output.value = '';
      statusText.textContent = '';
      progressFill.style.width = '0%';
      downloadBtn.textContent = 'Download';
    };
  });

  // ── Plugin UI logic ──
  const exportBtn = document.getElementById('export');
  const copyBtn = document.getElementById('copy');
  const downloadBtn = document.getElementById('download');
  const output = document.getElementById('output');
  const statusText = document.getElementById('statusText');
  const progressFill = document.getElementById('progressFill');

  let lastImages = [];
  let lastFileName = 'figma-export';
  let lastComposeFiles = null;

  function getOptions() {
    return {
      includeChildren: document.getElementById('optChildren').checked,
      includeFills: document.getElementById('optFills').checked,
      includeStrokes: document.getElementById('optStrokes').checked,
      includeRadius: document.getElementById('optRadius').checked,
      includeEffects: document.getElementById('optEffects').checked,
      includeTextStyles: document.getElementById('optText').checked,
      embedImages: currentTab === 'html'
        ? document.getElementById('optEmbed').checked
        : document.getElementById('optComposeImg').checked,
      exportVectorsSvg: document.getElementById('optSvg').checked,
      rasterizeInstancesComponents: document.getElementById('optRasterIC').checked,
      rasterizeClippedMaskedContainers: document.getElementById('optRasterClip').checked,
      extractCssVars: document.getElementById('optCssVars').checked,
      imageFormat: document.getElementById('optImgFmt').value,
      imageScale: currentTab === 'html'
        ? parseInt(document.getElementById('optImgScale').value, 10)
        : parseInt(document.getElementById('optComposeScale').value, 10)
    };
  }

  exportBtn.onclick = () => {
    const scope = document.querySelector('input[name=scope]:checked').value;
    if (currentTab === 'compose') {
      const composeFormat = document.querySelector('input[name=composeFormat]:checked').value;
      parent.postMessage({ pluginMessage: { type: 'export-compose', scope, options: getOptions(), composeFormat } }, '*');
    } else {
      parent.postMessage({ pluginMessage: { type: 'export-html', scope, options: getOptions() } }, '*');
    }
    statusText.textContent = 'Starting...';
    progressFill.style.width = '0%';
  };

  copyBtn.onclick = () => {
    output.select();
    document.execCommand('copy');
    statusText.textContent = 'Copied to clipboard.';
  };

  downloadBtn.onclick = () => {
    if (!output.value) return;

    // Compose file structure mode
    if (currentTab === 'compose' && lastComposeFiles) {
      const encoder = new TextEncoder();
      const files = [];
      // Screen.kt
      files.push({ name: 'ui/Screen.kt', data: encoder.encode(lastComposeFiles.screenKt) });
      // Components
      if (lastComposeFiles.componentFiles) {
        for (const [name, code] of Object.entries(lastComposeFiles.componentFiles)) {
          files.push({ name: 'ui/components/' + name + '.kt', data: encoder.encode(code) });
        }
      }
      // Color.kt
      if (lastComposeFiles.colorKt) {
        files.push({ name: 'ui/theme/Color.kt', data: encoder.encode(lastComposeFiles.colorKt) });
      }
      // Images
      for (const img of lastImages) {
        files.push({ name: img.name, data: base64ToUint8Array(img.base64) });
      }
      const zip = buildZip(files);
      const blob = new Blob([zip], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = lastFileName + '-compose.zip';
      a.click();
      URL.revokeObjectURL(url);
      statusText.textContent = `Downloaded ${lastFileName}-compose.zip`;
      return;
    }

    // Compose single mode or HTML with images
    if (lastImages.length > 0) {
      const encoder = new TextEncoder();
      const ext = currentTab === 'compose' ? 'kt' : 'html';
      const mainName = currentTab === 'compose' ? 'Screen.kt' : 'index.html';
      const mainData = encoder.encode(output.value);
      const zipFiles = [{ name: mainName, data: mainData }];
      for (const img of lastImages) {
        zipFiles.push({ name: img.name, data: base64ToUint8Array(img.base64) });
      }
      const zip = buildZip(zipFiles);
      const blob = new Blob([zip], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = lastFileName + '.zip';
      a.click();
      URL.revokeObjectURL(url);
      statusText.textContent = `Downloaded ${lastFileName}.zip`;
    } else {
      const ext = currentTab === 'compose' ? 'kt' : 'html';
      const mime = currentTab === 'compose' ? 'text/plain' : 'text/html';
      const blob = new Blob([output.value], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = lastFileName + '.' + ext;
      a.click();
      URL.revokeObjectURL(url);
      statusText.textContent = `Downloaded ${lastFileName}.${ext}`;
    }
  };

  onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'html-result') {
      output.value = msg.html;
      lastImages = msg.images || [];
      lastFileName = msg.fileName || 'figma-export';
      lastComposeFiles = null;
      downloadBtn.textContent = lastImages.length > 0
        ? `Download .zip (${lastImages.length} img)`
        : 'Download .html';
      statusText.textContent = 'Done';
      progressFill.style.width = '100%';
    }

    if (msg.type === 'compose-result') {
      output.value = msg.code;
      lastImages = msg.images || [];
      lastFileName = msg.fileName || 'figma-export';
      lastComposeFiles = msg.format === 'files' ? msg.files : null;
      if (msg.format === 'files') {
        const compCount = msg.files && msg.files.componentFiles ? Object.keys(msg.files.componentFiles).length : 0;
        downloadBtn.textContent = `Download .zip (${compCount} components)`;
      } else {
        downloadBtn.textContent = lastImages.length > 0
          ? `Download .zip (${lastImages.length} img)`
          : 'Download .kt';
      }
      statusText.textContent = 'Done';
      progressFill.style.width = '100%';
    }

    if (msg.type === 'export-progress') {
      const pct = msg.total > 0 ? Math.round((msg.current / msg.total) * 100) : 0;
      progressFill.style.width = pct + '%';
      statusText.textContent = `${msg.current}/${msg.total} nodes...`;
    }

    if (msg.type === 'export-status') {
      statusText.textContent = msg.status || '';
    }
  };
</script>
